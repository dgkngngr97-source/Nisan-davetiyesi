<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doğukan & Ege Nişan Davetiyesi</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="davetiye-konteyner">
        
        <div id="zarf-sahne" class="sahne aktif">
            <div class="zarf-wrapper">
                <div class="zarf-ic"></div>
                
                <div class="davetiye-kart" id="davetiye-kart">
                    <img src="davetiye_kart.png" class="davetiye-kart-img" alt="Davetiye Kartı">
                </div>

                <img src="zarf_alt.png" class="zarf-on-img" alt="Zarf Ön">
                
                <div class="zarf-kapak-kasa">
                    <img src="zarf_ust_kapak.png" class="zarf-ust-img" alt="Zarf Kapak">
                </div>
                
                <img src="muhur.PNG" class="muhur-buton" id="muhur-btn" alt="Mühür">
                
                <p class="ac-notu">Açmak İçin Mühüre Tıklayın</p>
            </div>
        </div>

        <div id="detay-sahne" class="detay-sahne">
            
            <img src="cicek_detay.png" class="kose-cicek sol-ust" alt="Çiçek">
            <img src="cicek_detay.png" class="kose-cicek sag-alt" alt="Çiçek">

            <div class="countdown-section">
                <h3>Nişanımıza Kalan Süre</h3>
                <div id="countdown">
                    <div class="time-box"><span id="days">00</span><p>Gün</p></div>
                    <div class="time-box"><span id="hours">00</span><p>Saat</p></div>
                    <div class="time-box"><span id="minutes">00</span><p>Dakika</p></div>
                    <div class="time-box"><span id="seconds">00</span><p>Saniye</p></div>
                </div>
            </div>

            <div class="toren-yeri-kart">
                <i class="fa-solid fa-map-location-dot mekan-ikon"></i>
                <h3>TÖREN YERİ</h3>
                <p class="mekan-adi">Cafe Home Restaurant</p>
                <p class="mekan-adres">Atakum / Samsun</p>
                
                <a href="https://maps.google.com/?q=cafe+home+restaurant+atakum+samsun" target="_blank" class="btn-harita">
                    <i class="fa-solid fa-location-arrow"></i> Konumu Haritalarda Gör
                </a>
            </div>

            <div class="rsvp-kart">
                <h3>Katılım Durumu</h3>
                <p class="rsvp-alt-not">Lütfen katılım durumunuzu bildiriniz.</p>
                <form id="rsvp-form">
                    <input type="text" placeholder="Adınız Soyadınız" required>
                    <div class="radio-secenekleri">
                        <label><input type="radio" name="katilim" value="evet" checked> Katılıyorum 🎉</label>
                        <label><input type="radio" name="katilim" value="hayir"> Katılamıyorum 😔</label>
                    </div>
                    <select required>
                        <option value="" disabled selected>Kişi Sayısı</option>
                        <option value="1">1 Kişi</option>
                        <option value="2">2 Kişi</option>
                        <option value="3+">3+ Kişi</option>
                    </select>
                    <button type="submit" class="btn-gonder">Formu Gönder</button>
                </form>
            </div>

            <footer>
                <p>Doğukan & Ege © 2026</p>
            </footer>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
